<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLUXX — Investor Portal</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #111318; color: #e4e6ea; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .container { text-align: center; padding: 40px; }
  .brand { font-size: 18px; font-weight: 700; color: #6bb8ff; letter-spacing: 3px; margin-bottom: 8px; }
  .sub { font-size: 13px; color: #7a8494; margin-bottom: 48px; }
  .links { display: flex; gap: 24px; justify-content: center; flex-wrap: wrap; }
  a.card {
    display: block; background: #1a1d24; border: 1px solid #2a2e38; border-radius: 12px;
    padding: 32px 40px; text-decoration: none; transition: all 0.2s; min-width: 220px;
  }
  a.card:hover { border-color: #6bb8ff; transform: translateY(-2px); }
  a.card h3 { font-size: 16px; color: #e4e6ea; margin-bottom: 6px; }
  a.card p { font-size: 12px; color: #7a8494; }
  .footer { position: fixed; bottom: 20px; font-size: 11px; color: #555d6e; }
</style>
</head>
<body>
<div class="container">
  <div class="brand">FLUXX</div>
  <div class="sub">Virtual Production & Visual Effects — Investor Portal</div>
  <div class="links">
    <a class="card" href="pitch.html">
      <h3>Pitch Deck</h3>
      <p>Company overview & investment opportunity</p>
    </a>
    <a class="card" href="financials.html">
      <h3>Financial Model</h3>
      <p>Revenue, expenses & projections</p>
    </a>
  </div>
</div>
<div class="footer">Confidential — Do Not Distribute</div>
</body>
</html>
