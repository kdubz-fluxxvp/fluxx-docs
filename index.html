  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #0b0d18;
    color: #eaedf5;
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
  }
  .container { text-align: center; padding: 40px 24px; max-width: 720px; }
  .logo-mark { width: 200px; height: auto; margin-bottom: 32px; opacity: 0.95; }
  .sub { font-size: 13px; color: #8b90a8; margin-bottom: 48px; letter-spacing: 0.3px; }
  .links { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
  a.card {
    display: block;
    background: #0e1020;
    border: 1px solid rgba(0, 196, 255, 0.12);
    border-radius: 14px;
    padding: 28px 32px;
    text-decoration: none;
    transition: all 0.3s;
    min-width: 180px;
    flex: 1;
    position: relative;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3), 0 0 12px rgba(0,196,255,0.02);
  }
  a.card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    border-radius: 4px 0 0 4px;
  }
  a.card:nth-child(1)::before { background: #00C4FF; }
  a.card:nth-child(2)::before { background: #7d40ff; }
  a.card:nth-child(3)::before { background: #5eff5a; }

  a.card:nth-child(1) { border-color: rgba(0, 196, 255, 0.12); }
  a.card:nth-child(2) { border-color: rgba(125, 64, 255, 0.12); }
  a.card:nth-child(3) { border-color: rgba(94, 255, 90, 0.12); }

  a.card:nth-child(1):hover { border-color: rgba(0, 196, 255, 0.3); }
  a.card:nth-child(2):hover { border-color: rgba(125, 64, 255, 0.3); }
  a.card:nth-child(3):hover { border-color: rgba(94, 255, 90, 0.3); }

  a.card:hover {
    transform: translateY(-3px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.4), 0 0 20px rgba(0,196,255,0.04);
  }
  a.card h3 { font-size: 15px; font-weight: 700; color: #eaedf5; margin-bottom: 6px; padding-left: 8px; }
  a.card p { font-size: 12px; color: #8b90a8; padding-left: 8px; }

  a.card:nth-child(1) h3 { color: #00C4FF; }
  a.card:nth-child(2) h3 { color: #7d40ff; }
  a.card:nth-child(3) h3 { color: #5eff5a; }

  .footer {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    font-size: 11px; color: #555a72; white-space: nowrap;
  }
</style>
</head>
